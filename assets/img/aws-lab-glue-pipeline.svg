<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AWS Glue practical pipeline lab</title>
  <desc id="desc">Diagram showing raw S3 data, Glue crawler, Data Catalog, Glue ETL job, curated S3 data, and Athena.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7dd3fc"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; }
      .label { font: 700 21px Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 16px Arial, sans-serif; fill: #cbd5e1; }
      .data { fill: #14352d; stroke: #5eead4; stroke-width: 2.5; rx: 10; }
      .glue { fill: #3b2f16; stroke: #fbbf24; stroke-width: 2.5; rx: 10; }
      .query { fill: #172554; stroke: #93c5fd; stroke-width: 2.5; rx: 10; }
      .line { stroke: #7dd3fc; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="54" y="72" class="title">Lab 3: AWS Glue ETL Pipeline</text>
  <text x="54" y="108" class="small">Catalog raw CSV data, transform it, and query curated Parquet files</text>

  <rect x="50" y="260" width="170" height="100" class="data"/>
  <text x="95" y="300" class="label">Raw S3</text>
  <text x="88" y="330" class="small">CSV files</text>

  <rect x="285" y="170" width="175" height="92" class="glue"/>
  <text x="328" y="208" class="label">Crawler</text>
  <text x="314" y="236" class="small">Infer schema</text>

  <rect x="285" y="390" width="175" height="92" class="glue"/>
  <text x="317" y="428" class="label">Catalog</text>
  <text x="318" y="456" class="small">Table metadata</text>

  <rect x="560" y="260" width="180" height="100" class="glue"/>
  <text x="606" y="300" class="label">Glue Job</text>
  <text x="594" y="330" class="small">Transform data</text>

  <rect x="830" y="260" width="170" height="100" class="data"/>
  <text x="876" y="300" class="label">Curated S3</text>
  <text x="884" y="330" class="small">Parquet</text>

  <rect x="830" y="430" width="170" height="92" class="query"/>
  <text x="878" y="468" class="label">Athena</text>
  <text x="867" y="496" class="small">SQL queries</text>

  <path d="M220 310 C255 310 250 216 285 216" class="line"/>
  <path d="M372 262 L372 390" class="line"/>
  <path d="M460 436 C510 436 510 310 560 310" class="line"/>
  <path d="M740 310 L830 310" class="line"/>
  <path d="M915 360 L915 430" class="line"/>
</svg>
