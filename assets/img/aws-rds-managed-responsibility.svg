<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Amazon RDS managed responsibility model</title>
  <desc id="desc">A diagram showing that AWS manages infrastructure, patching, backups, and high availability while customers manage schema, users, and query tuning.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="50" y="52" width="1100" height="456" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="86" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Amazon RDS Responsibility Split</text>
  <text x="86" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">RDS removes much of the database operations burden, but application and schema design remain your responsibility.</text>
  <g font-family="Arial, sans-serif">
    <rect x="104" y="210" width="450" height="226" rx="16" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="329" y="256" text-anchor="middle" font-size="27" font-weight="700" fill="#1d4ed8">AWS Manages</text>
    <text x="152" y="302" font-size="18" fill="#1e3a8a">• Hardware and host maintenance</text>
    <text x="152" y="336" font-size="18" fill="#1e3a8a">• OS and database patching</text>
    <text x="152" y="370" font-size="18" fill="#1e3a8a">• Automated backups</text>
    <text x="152" y="404" font-size="18" fill="#1e3a8a">• Failover when Multi-AZ is enabled</text>
    <rect x="646" y="210" width="450" height="226" rx="16" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
    <text x="871" y="256" text-anchor="middle" font-size="27" font-weight="700" fill="#166534">You Manage</text>
    <text x="694" y="302" font-size="18" fill="#14532d">• Database schema and indexes</text>
    <text x="694" y="336" font-size="18" fill="#14532d">• Users, passwords, and access</text>
    <text x="694" y="370" font-size="18" fill="#14532d">• Query tuning and workload design</text>
    <text x="694" y="404" font-size="18" fill="#14532d">• Application connection behavior</text>
  </g>
</svg>
