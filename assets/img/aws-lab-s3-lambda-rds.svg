<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">S3 Lambda RDS ingestion lab</title>
  <desc id="desc">Diagram showing CSV upload to S3, S3 event invoking Lambda, Lambda reading secrets, and inserting into RDS.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#67e8f9"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; }
      .label { font: 700 22px Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 16px Arial, sans-serif; fill: #cbd5e1; }
      .data { fill: #14352d; stroke: #5eead4; stroke-width: 2.5; rx: 10; }
      .compute { fill: #3b2f16; stroke: #fbbf24; stroke-width: 2.5; rx: 10; }
      .secure { fill: #3b2430; stroke: #f472b6; stroke-width: 2.5; rx: 10; }
      .line { stroke: #67e8f9; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="54" y="72" class="title">Lab 4: S3 to Lambda to RDS</text>
  <text x="54" y="108" class="small">Trigger a serverless ingestion function when a CSV file lands in S3</text>

  <rect x="85" y="250" width="200" height="110" class="data"/>
  <text x="126" y="294" class="label">S3 Upload</text>
  <text x="130" y="326" class="small">products.csv</text>

  <rect x="410" y="250" width="210" height="110" class="compute"/>
  <text x="472" y="294" class="label">Lambda</text>
  <text x="452" y="326" class="small">Parse and insert</text>

  <rect x="735" y="250" width="200" height="110" class="data"/>
  <text x="794" y="294" class="label">RDS</text>
  <text x="764" y="326" class="small">Relational table</text>

  <rect x="410" y="430" width="210" height="92" class="secure"/>
  <text x="444" y="468" class="label">Secrets Manager</text>
  <text x="464" y="496" class="small">DB credentials</text>

  <path d="M285 305 L410 305" class="line"/>
  <path d="M620 305 L735 305" class="line"/>
  <path d="M515 430 L515 360" class="line"/>
</svg>
