<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Amazon S3 object storage model</title>
  <desc id="desc">A diagram showing users and applications storing objects in an S3 bucket using unique keys.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="50" y="52" width="1100" height="456" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="86" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Amazon S3 Object Storage</text>
  <text x="86" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">A bucket stores objects. Each object is addressed by a unique key, and the object value is the file content plus metadata.</text>
  <g font-family="Arial, sans-serif">
    <rect x="88" y="226" width="190" height="112" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="183" y="270" text-anchor="middle" font-size="22" font-weight="700" fill="#075985">Applications</text>
    <text x="183" y="302" text-anchor="middle" font-size="15" fill="#075985">REST API / SDK / CLI</text>
    <path d="M292 282h132" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="444" y="178" width="306" height="248" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="597" y="226" text-anchor="middle" font-size="28" font-weight="700" fill="#92400e">S3 Bucket</text>
    <text x="597" y="258" text-anchor="middle" font-size="15" fill="#92400e">globally unique bucket name</text>
    <rect x="486" y="292" width="222" height="42" rx="8" fill="#ffffff" stroke="#fdba74"/>
    <text x="597" y="319" text-anchor="middle" font-size="16" fill="#7c2d12">images/logo.png -> object</text>
    <rect x="486" y="346" width="222" height="42" rx="8" fill="#ffffff" stroke="#fdba74"/>
    <text x="597" y="373" text-anchor="middle" font-size="16" fill="#7c2d12">logs/2025/app.log -> object</text>
    <path d="M766 282h132" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="922" y="210" width="180" height="144" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="1012" y="258" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">Use Cases</text>
    <text x="1012" y="290" text-anchor="middle" font-size="15" fill="#166534">backups</text>
    <text x="1012" y="315" text-anchor="middle" font-size="15" fill="#166534">logs</text>
    <text x="1012" y="340" text-anchor="middle" font-size="15" fill="#166534">media files</text>
    <text x="86" y="464" font-size="17" fill="#526070">S3 does not need folder hierarchy. Prefixes such as logs/ or images/ are part of the object key and make the console look folder-like.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
