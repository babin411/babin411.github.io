<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Amazon RDS backup and restore model</title>
  <desc id="desc">A diagram comparing automated backups and manual snapshots for Amazon RDS restore operations.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="54" y="54" width="1092" height="452" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="88" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">RDS Backup and Restore</text>
  <text x="88" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">Automated backups support point-in-time recovery. Manual snapshots are retained until you delete them.</text>
  <g font-family="Arial, sans-serif">
    <rect x="108" y="230" width="210" height="118" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="213" y="276" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">RDS Instance</text>
    <text x="213" y="308" text-anchor="middle" font-size="15" fill="#1e3a8a">database storage</text>
    <path d="M338 270h154" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M338 326h154" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="526" y="204" width="236" height="92" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="644" y="242" text-anchor="middle" font-size="21" font-weight="700" fill="#166534">Automated Backups</text>
    <text x="644" y="270" text-anchor="middle" font-size="14" fill="#166534">retention window + PITR</text>
    <rect x="526" y="322" width="236" height="92" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="644" y="360" text-anchor="middle" font-size="21" font-weight="700" fill="#92400e">Manual Snapshots</text>
    <text x="644" y="388" text-anchor="middle" font-size="14" fill="#92400e">kept until deleted</text>
    <path d="M784 250h118" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M784 368h118" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="930" y="254" width="164" height="104" rx="14" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <text x="1012" y="294" text-anchor="middle" font-size="22" font-weight="700" fill="#334155">Restore</text>
    <text x="1012" y="326" text-anchor="middle" font-size="15" fill="#334155">new DB instance</text>
    <text x="88" y="458" font-size="17" fill="#526070">Restoring from a backup or snapshot creates a new DB instance with a new endpoint, so application connection settings must be updated.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
