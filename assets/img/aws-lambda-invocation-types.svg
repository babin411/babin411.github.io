<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">AWS Lambda invocation types</title>
  <desc id="desc">A diagram comparing synchronous, asynchronous, and poll-based Lambda invocation models.</desc>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">Lambda Invocation Models</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="18" fill="#526070">Different event sources invoke Lambda differently. The integration model controls response behavior, retries, and queue polling.</text>
  <g font-family="Arial, sans-serif">
    <rect x="78" y="182" width="318" height="250" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="237" y="234" text-anchor="middle" font-size="25" font-weight="700" fill="#1d4ed8">Synchronous</text>
    <text x="237" y="278" text-anchor="middle" font-size="16" fill="#334155">Caller waits for response</text>
    <text x="237" y="312" text-anchor="middle" font-size="16" fill="#334155">API Gateway, ALB, SDK</text>
    <path d="M154 354h166" stroke="#3b82f6" stroke-width="4" fill="none" marker-end="url(#arrow-blue)"/>
    <rect x="441" y="182" width="318" height="250" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="600" y="234" text-anchor="middle" font-size="25" font-weight="700" fill="#92400e">Asynchronous</text>
    <text x="600" y="278" text-anchor="middle" font-size="16" fill="#334155">Event is queued by Lambda</text>
    <text x="600" y="312" text-anchor="middle" font-size="16" fill="#334155">S3, SNS, EventBridge</text>
    <path d="M516 354h166" stroke="#f59e0b" stroke-width="4" fill="none" marker-end="url(#arrow-orange)"/>
    <rect x="804" y="182" width="318" height="250" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="963" y="234" text-anchor="middle" font-size="25" font-weight="700" fill="#166534">Poll-Based</text>
    <text x="963" y="278" text-anchor="middle" font-size="16" fill="#334155">Lambda polls records</text>
    <text x="963" y="312" text-anchor="middle" font-size="16" fill="#334155">SQS, Kinesis, DynamoDB Streams</text>
    <path d="M880 354h166" stroke="#22c55e" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
  </g>
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#3b82f6"/></marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#f59e0b"/></marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/></marker>
  </defs>
</svg>
