<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Amazon RDS Multi-AZ deployment</title>
  <desc id="desc">A diagram showing an RDS primary instance in one availability zone synchronously replicating to a standby instance in another availability zone.</desc>
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="70" y="82" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">RDS Multi-AZ Deployment</text>
  <text x="70" y="116" font-family="Arial, sans-serif" font-size="18" fill="#526070">A Multi-AZ DB instance keeps a synchronous standby in another Availability Zone for high availability and failover.</text>
  <g font-family="Arial, sans-serif">
    <rect x="96" y="178" width="420" height="250" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="306" y="224" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Availability Zone A</text>
    <rect x="196" y="270" width="220" height="96" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="3"/>
    <text x="306" y="309" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">Primary DB</text>
    <text x="306" y="339" text-anchor="middle" font-size="15" fill="#1e3a8a">reads and writes</text>
    <rect x="684" y="178" width="420" height="250" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="894" y="224" text-anchor="middle" font-size="24" font-weight="700" fill="#1f2937">Availability Zone B</text>
    <rect x="784" y="270" width="220" height="96" rx="14" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="894" y="309" text-anchor="middle" font-size="22" font-weight="700" fill="#92400e">Standby DB</text>
    <text x="894" y="339" text-anchor="middle" font-size="15" fill="#92400e">failover target</text>
    <path d="M426 318h346" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="600" y="292" text-anchor="middle" font-size="17" fill="#334155">synchronous replication</text>
    <path d="M600 426c-52 46-196 48-260 6" stroke="#22c55e" stroke-width="4" fill="none" marker-end="url(#arrow-green)"/>
    <text x="600" y="486" text-anchor="middle" font-size="17" fill="#166534">applications use the RDS endpoint, not the instance IP address</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#22c55e"/>
    </marker>
  </defs>
</svg>
