<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">S3 to Lambda to DynamoDB pattern</title>
  <desc id="desc">A diagram showing an object upload to S3 triggering Lambda, which writes metadata to DynamoDB and logs to CloudWatch.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="54" y="54" width="1092" height="452" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="88" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">S3 Event Processing with Lambda</text>
  <text x="88" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">A common serverless pattern: object upload triggers Lambda, Lambda processes the file, and downstream services store results.</text>
  <g font-family="Arial, sans-serif">
    <rect x="104" y="232" width="190" height="118" rx="14" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="199" y="278" text-anchor="middle" font-size="24" font-weight="700" fill="#92400e">S3 Bucket</text>
    <text x="199" y="310" text-anchor="middle" font-size="15" fill="#92400e">ObjectCreated</text>
    <path d="M316 291h148" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="496" y="216" width="210" height="150" rx="16" fill="#fdf4ff" stroke="#d946ef" stroke-width="2"/>
    <text x="601" y="268" text-anchor="middle" font-size="25" font-weight="700" fill="#86198f">Lambda</text>
    <text x="601" y="302" text-anchor="middle" font-size="15" fill="#86198f">read, validate, transform</text>
    <path d="M728 270h144" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <path d="M704 336c80 72 160 72 238 12" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="904" y="206" width="194" height="104" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="1001" y="249" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">DynamoDB</text>
    <text x="1001" y="280" text-anchor="middle" font-size="15" fill="#166534">metadata rows</text>
    <rect x="904" y="346" width="194" height="104" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="1001" y="389" text-anchor="middle" font-size="22" font-weight="700" fill="#1d4ed8">CloudWatch</text>
    <text x="1001" y="420" text-anchor="middle" font-size="15" fill="#1d4ed8">logs and metrics</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
