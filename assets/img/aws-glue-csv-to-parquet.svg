<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">AWS Glue CSV to Parquet pipeline</title>
  <desc id="desc">Diagram showing raw CSV files in S3 cataloged by Glue, transformed by a Glue job, written as Parquet, and queried by Athena.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#67e8f9"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #f8fafc; }
      .label { font: 700 22px Arial, sans-serif; fill: #f8fafc; }
      .small { font: 500 17px Arial, sans-serif; fill: #cbd5e1; }
      .raw { fill: #3b2430; stroke: #f472b6; stroke-width: 2.5; rx: 10; }
      .glue { fill: #3b2f16; stroke: #fbbf24; stroke-width: 2.5; rx: 10; }
      .curated { fill: #14352d; stroke: #5eead4; stroke-width: 2.5; rx: 10; }
      .query { fill: #1f2a44; stroke: #93c5fd; stroke-width: 2.5; rx: 10; }
      .line { stroke: #67e8f9; stroke-width: 4; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="54" y="70" class="title">CSV to Parquet with AWS Glue</text>
  <text x="54" y="104" class="small">Catalog raw files, transform data, and query curated Parquet output</text>

  <rect x="58" y="250" width="190" height="110" class="raw"/>
  <text x="106" y="294" class="label">Raw S3</text>
  <text x="94" y="326" class="small">customer.csv</text>

  <rect x="318" y="160" width="200" height="96" class="glue"/>
  <text x="371" y="200" class="label">Crawler</text>
  <text x="357" y="230" class="small">Creates table</text>

  <rect x="318" y="370" width="200" height="96" class="glue"/>
  <text x="350" y="410" class="label">Catalog Table</text>
  <text x="358" y="440" class="small">customers_csv</text>

  <rect x="590" y="250" width="220" height="110" class="glue"/>
  <text x="638" y="294" class="label">Glue Job</text>
  <text x="629" y="326" class="small">Map and convert</text>

  <rect x="875" y="250" width="190" height="110" class="curated"/>
  <text x="925" y="294" class="label">Curated S3</text>
  <text x="925" y="326" class="small">Parquet files</text>

  <rect x="875" y="430" width="190" height="96" class="query"/>
  <text x="935" y="470" class="label">Athena</text>
  <text x="916" y="500" class="small">SQL queries</text>

  <path d="M248 305 C290 305 282 208 318 208" class="line"/>
  <path d="M418 256 L418 370" class="line"/>
  <path d="M518 418 C555 418 555 305 590 305" class="line"/>
  <path d="M810 305 L875 305" class="line"/>
  <path d="M970 360 L970 430" class="line"/>
</svg>
