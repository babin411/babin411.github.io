<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">EC2 public private and Elastic IP addresses</title>
  <desc id="desc">A diagram comparing public IP addresses, private IP addresses, and Elastic IP addresses for an EC2 instance.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <text x="70" y="78" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">EC2 IP Addresses</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#526070">Private IPs stay inside the VPC. Public IPs can change after stop/start. Elastic IPs stay fixed until you release them.</text>
  <g font-family="Arial, sans-serif">
    <rect x="72" y="166" width="476" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="112" y="215" font-size="26" font-weight="700" fill="#1f2937">Inside the VPC</text>
    <rect x="122" y="254" width="172" height="96" rx="12" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="208" y="294" text-anchor="middle" font-size="18" font-weight="700" fill="#166534">Private IP</text>
    <text x="208" y="322" text-anchor="middle" font-size="15" fill="#166534">10.0.1.42</text>
    <rect x="340" y="238" width="128" height="126" rx="12" fill="#111827"/>
    <rect x="370" y="270" width="68" height="42" rx="7" fill="#60a5fa"/>
    <circle cx="404" cy="335" r="12" fill="#f59e0b"/>
    <text x="404" y="397" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2937">EC2</text>
    <path d="M294 302h46" stroke="#22c55e" stroke-width="4" fill="none"/>
    <rect x="652" y="166" width="476" height="300" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
    <text x="692" y="215" font-size="26" font-weight="700" fill="#1f2937">From the Internet</text>
    <rect x="702" y="254" width="164" height="96" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
    <text x="784" y="294" text-anchor="middle" font-size="18" font-weight="700" fill="#1d4ed8">Public IP</text>
    <text x="784" y="322" text-anchor="middle" font-size="14" fill="#1d4ed8">changes on stop/start</text>
    <rect x="914" y="254" width="164" height="96" rx="12" fill="#fff7ed" stroke="#f59e0b" stroke-width="2"/>
    <text x="996" y="294" text-anchor="middle" font-size="18" font-weight="700" fill="#92400e">Elastic IP</text>
    <text x="996" y="322" text-anchor="middle" font-size="14" fill="#92400e">fixed public address</text>
    <path d="M866 302h48" stroke="#64748b" stroke-width="4" fill="none"/>
    <text x="70" y="510" font-size="17" fill="#526070">Tip: release unused Elastic IP addresses. AWS can charge for allocated addresses that are not attached to a running resource.</text>
  </g>
</svg>
