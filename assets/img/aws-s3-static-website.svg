<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Static website hosting with Amazon S3</title>
  <desc id="desc">A diagram showing a browser requesting an S3 static website endpoint that serves index.html from a public bucket.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="54" y="54" width="1092" height="452" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="88" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">S3 Static Website Hosting</text>
  <text x="88" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">A bucket can serve static files when website hosting is enabled and read access is intentionally allowed.</text>
  <g font-family="Arial, sans-serif">
    <rect x="102" y="232" width="178" height="118" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="191" y="278" text-anchor="middle" font-size="23" font-weight="700" fill="#075985">Browser</text>
    <text x="191" y="310" text-anchor="middle" font-size="15" fill="#075985">HTTP request</text>
    <path d="M302 291h148" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="478" y="198" width="272" height="186" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="614" y="245" text-anchor="middle" font-size="26" font-weight="700" fill="#92400e">S3 Bucket</text>
    <text x="614" y="278" text-anchor="middle" font-size="15" fill="#92400e">static website hosting enabled</text>
    <rect x="526" y="312" width="176" height="42" rx="8" fill="#ffffff" stroke="#fdba74"/>
    <text x="614" y="339" text-anchor="middle" font-size="16" fill="#7c2d12">index.html</text>
    <path d="M772 291h148" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="948" y="232" width="166" height="118" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="1031" y="276" text-anchor="middle" font-size="22" font-weight="700" fill="#166534">Response</text>
    <text x="1031" y="309" text-anchor="middle" font-size="15" fill="#166534">HTML, CSS, JS</text>
    <text x="88" y="446" font-size="17" fill="#526070">For public websites, disable Block Public Access only intentionally and use a narrow read-only bucket policy for the website objects.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
