<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">AWS Lambda serverless execution flow</title>
  <desc id="desc">A diagram showing an event source invoking AWS Lambda, Lambda running function code, and the function calling downstream AWS services.</desc>
  <rect width="1200" height="560" fill="#f7f9fb"/>
  <rect x="50" y="52" width="1100" height="456" rx="18" fill="#ffffff" stroke="#d8dee8" stroke-width="2"/>
  <text x="86" y="112" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">AWS Lambda Execution Flow</text>
  <text x="86" y="146" font-family="Arial, sans-serif" font-size="18" fill="#526070">Events invoke a function. Lambda provisions the execution environment, runs code, scales automatically, and writes logs.</text>
  <g font-family="Arial, sans-serif">
    <rect x="96" y="230" width="210" height="118" rx="14" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="201" y="276" text-anchor="middle" font-size="23" font-weight="700" fill="#075985">Event Source</text>
    <text x="201" y="309" text-anchor="middle" font-size="15" fill="#075985">S3, API Gateway, SQS</text>
    <path d="M328 289h142" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="500" y="194" width="240" height="190" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3"/>
    <text x="620" y="246" text-anchor="middle" font-size="28" font-weight="700" fill="#92400e">Lambda</text>
    <text x="620" y="281" text-anchor="middle" font-size="16" fill="#92400e">function code</text>
    <text x="620" y="309" text-anchor="middle" font-size="16" fill="#92400e">runtime + layers</text>
    <text x="620" y="337" text-anchor="middle" font-size="16" fill="#92400e">execution role</text>
    <path d="M762 289h142" stroke="#64748b" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <rect x="934" y="230" width="184" height="118" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
    <text x="1026" y="276" text-anchor="middle" font-size="23" font-weight="700" fill="#166534">Resources</text>
    <text x="1026" y="309" text-anchor="middle" font-size="15" fill="#166534">DynamoDB, S3, RDS</text>
    <text x="86" y="452" font-size="17" fill="#526070">You manage the code and permissions. Lambda manages server provisioning, scaling, runtime execution, and log delivery.</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
